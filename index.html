<script>
(function () {

  // 1. PRIORIDADE MÁXIMA: URL manual
  const params = new URLSearchParams(window.location.search);
  const forced = params.get("lang");

  if (forced === "pt") {
    return window.location.replace("./br/");
  }
  if (forced === "en") {
    return window.location.replace("./en/");
  }

  // 2. DETECÇÃO AUTOMÁTICA DO NAVEGADOR
  const lang = (navigator.language || "").toLowerCase();

  const isPT = lang.startsWith("pt");

  // 3. DEFAULT GLOBAL (anônimo ou qualquer outro caso)
  const target = isPT ? "./br/" : "./en/";

  window.location.replace(target);

})();
</script>
